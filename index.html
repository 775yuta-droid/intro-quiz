<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 イントロクイズ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Background canvas -->
  <canvas id="bg-canvas"></canvas>
  <div class="grid-overlay"></div>
  <div class="vignette"></div>

  <!-- Header -->
  <div class="header-bar" id="header-bar" style="display:none">
    <div class="header-logo">🎵 INTRO QUIZ</div>
    <div class="header-controls" style="display:flex; align-items:center; gap:16px;">
      <button class="jump-menu-btn" onclick="toggleJumpMenu()">🔢 JUMP</button>
      <div class="header-progress" id="header-progress">1 / 21</div>
    </div>
  </div>

  <!-- Jump Menu Overlay -->
  <div class="jump-menu" id="jump-menu">
    <div class="jump-menu-inner">
      <div class="jump-menu-title">問題を選択</div>
      <div class="jump-grid" id="jump-grid">
        <!-- Generated by JS -->
      </div>
      <button class="jump-menu-close" onclick="toggleJumpMenu()">CLOSE</button>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar-wrap" id="progress-bar-wrap" style="display:none">
    <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
  </div>



  <!-- ============ SCREENS ============ -->
  <div id="app">

    <!-- TITLE SCREEN -->
    <div class="screen active" id="screen-title">
      <div class="title-logo">INTRO<br>QUIZ</div>
      <div class="title-sub">全 <span id="title-total">--</span> 問 ・ イントロを当てろ</div>
      <div class="wave-container" id="title-wave">
        <!-- bars added by JS -->
      </div>
      <button class="start-btn" onclick="startQuiz()">▶ START</button>
    </div>

    <!-- QUESTION SCREEN (question number display) -->
    <div class="screen" id="screen-question">
      <div class="section-pill">QUESTION</div>
      <div class="q-counter" id="q-counter">1</div>
      <div class="q-label">第 <span id="q-label-num">1</span> 問</div>
      <div class="audio-area">
        <div class="wave-container" id="play-wave"></div>
        <button class="play-btn" id="play-btn" onclick="togglePlay()">▶</button>
        <div class="audio-hint" id="audio-hint">クリックして再生</div>
      </div>
      <audio id="audio-player" preload="auto"></audio>
    </div>

    <!-- COUNTDOWN SCREEN -->
    <div class="screen" id="screen-countdown">
      <div class="thinking-text">THINKING TIME</div>
      <div class="countdown-wrap">
        <svg class="countdown-svg" viewBox="0 0 160 160">
          <circle class="countdown-bg" cx="80" cy="80" r="70" />
          <circle class="countdown-arc" id="countdown-arc" cx="80" cy="80" r="70" />
        </svg>
        <div class="countdown-num" id="countdown-num">30</div>
      </div>
      <div class="wave-container" id="countdown-wave"></div>
    </div>

    <!-- ANSWER SCREEN -->
    <div class="screen" id="screen-answer">
      <div class="reveal-label">正解は...</div>
      <div class="answer-title" id="answer-song-title">Song Title</div>
      <div class="answer-artist" id="answer-artist">Artist Name</div>
      <div class="yt-wrap" id="yt-wrap">
        <iframe id="yt-iframe" allow="autoplay; encrypted-media" allowfullscreen style="display:none;"></iframe>
        <video id="local-video" controls
          style="display:none; width:100%; height:100%; background:#000; outline:none;"></video>
      </div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">NEXT QUESTION →</button>
    </div>

    <!-- RESULT SCREEN -->
    <div class="screen" id="screen-result">
      <div class="section-pill">QUIZ COMPLETE</div>
      <div class="result-title">全問<br>終了！</div>
      <div class="result-msg">お疲れ様でした 🎉</div>
      <div class="wave-container" id="result-wave"></div>
      <button class="start-btn" onclick="restartQuiz()">▶ もう一度</button>
    </div>

  </div>

  <!-- Flash effect -->
  <div class="flash" id="flash"></div>



  <script src="index.js"></script>
</body>

</html>
